<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="min-h-screen flex items-center justify-center">

        <!-- Content -->
        <div class="flex items-center gap-24">

            <!-- Left Side -->
            <div class="w-[500px]">
                <h1 class="text-blue-600 text-6xl font-bold">
                    facebook
                </h1>

                <p class="text-3xl mt-3">
                    Facebook helps you connect and <br>
                    share with the people in your life.
                </p>
            </div>

            <!-- Right Side -->
            <div class="bg-white w-96 p-5 rounded-lg shadow-lg">
                <input
                    type="text"
                    placeholder="Email address or phone number"
                    class="w-full border border-gray-300 rounded-md p-3 mb-4 outline-none focus:border-blue-600">

               
                <input
                    type="password"
                    placeholder="Password"
                    class="w-full border border-gray-300 rounded-md p-3 mb-4 outline-none focus:border-blue-600">

                
                <button
                    class="w-full bg-blue-600 text-white py-3 rounded-md text-xl font-bold hover:bg-blue-700 cursor-pointer">
                    Log In
                </button>

                
                <p class="text-center text-blue-600 mt-4 hover:underline cursor-pointer">
                    Forgotten password?
                </p>

                <hr class="my-5">

            
                <div class="flex justify-center">
                    <button
                        class="bg-green-500 text-white px-8 py-3 rounded-md font-bold hover:bg-green-600 cursor-pointer">
                        Create New Account
                    </button>
                </div>

                
                <p class="text-center text-sm mt-8">
                    <span class="font-bold cursor-pointer hover:underline">Create a Page</span>
                    for a celebrity, brand or business.
                </p>

            </div>

        </div>

    </div>

</body>
</html>
